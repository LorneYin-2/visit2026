<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>报名数据管理 - 走访活动</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; background: #f0f2f5; padding: 16px; color: #333; }
  .container { max-width: 960px; margin: 0 auto; }
  .header { background: #1B2A4A; color: #fff; padding: 20px 24px; border-radius: 10px 10px 0 0; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
  .header h1 { font-size: 17px; letter-spacing: 1px; }
  .header .badge { font-size: 11px; color: #C5A55A; }
  .toolbar { background: #fff; padding: 14px 24px; border-bottom: 1px solid #eee; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .toolbar button { padding: 8px 18px; border: none; border-radius: 6px; font-size: 13px; cursor: pointer; font-family: inherit; }
  .btn-refresh { background: #2C5F8A; color: #fff; }
  .btn-export { background: #27ae60; color: #fff; }
  .btn-delete { background: #e74c3c; color: #fff; }
  .stats { margin-left: auto; font-size: 13px; color: #888; }
  .table-wrap { background: #fff; border-radius: 0 0 10px 10px; overflow-x: auto; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { background: #f8f9fb; padding: 10px 12px; text-align: left; font-weight: 600; color: #1B2A4A; border-bottom: 2px solid #e0e0e0; white-space: nowrap; }
  td { padding: 8px 12px; border-bottom: 1px solid #f0f0f0; white-space: nowrap; }
  tr:hover td { background: #f8f9fb; }
  td.remark { max-width: 140px; white-space: normal; word-break: break-all; }
  .empty { text-align: center; padding: 48px; color: #aaa; }
  .loading { text-align: center; padding: 48px; color: #888; }
  .error { text-align: center; padding: 48px; color: #e74c3c; }
  .last-update { font-size: 11px; color: #aaa; text-align: center; padding: 12px; }
  .dinner-yes { color: #27ae60; font-weight: 600; }
  .dinner-no { color: #e74c3c; }
  .password-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 999; }
  .password-box { background: #fff; padding: 32px; border-radius: 10px; text-align: center; width: 300px; }
  .password-box h3 { margin-bottom: 16px; color: #1B2A4A; }
  .password-box input { width: 100%; padding: 10px; border: 1.5px solid #ddd; border-radius: 6px; font-size: 15px; text-align: center; margin-bottom: 12px; }
  .password-box button { width: 100%; padding: 10px; background: #1B2A4A; color: #fff; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; }
  .password-box .err { color: #e74c3c; font-size: 12px; margin-top: 8px; display: none; }
</style>
</head>
<body>

<div class="password-overlay" id="pwOverlay">
  <div class="password-box">
    <h3>管理端登录</h3>
    <input type="password" id="pwInput" placeholder="请输入管理密码" onkeydown="if(event.key==='Enter')checkPw()">
    <button onclick="checkPw()">进入</button>
    <div class="err" id="pwErr">密码错误</div>
  </div>
</div>

<div class="container">
  <div class="header">
    <div>
      <h1>走访活动报名数据</h1>
      <div class="badge">2026年第六期专精特新企业培训班 · 北京新成科技</div>
    </div>
  </div>
  <div class="toolbar">
    <button class="btn-refresh" onclick="loadData()">刷新数据</button>
    <button class="btn-export" onclick="exportCSV()">导出 CSV</button>
    <button class="btn-delete" onclick="clearData()">清空测试数据</button>
    <div class="stats" id="stats"></div>
  </div>
  <div class="table-wrap">
    <div id="content" class="loading">加载中...</div>
    <table id="table" style="display:none;">
      <thead>
        <tr>
          <th>#</th>
          <th>报名时间</th>
          <th>姓名</th>
          <th>企业名称</th>
          <th>职务</th>
          <th>手机号</th>
          <th>微信号</th>
          <th>晚宴</th>
          <th>备注</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
  <div class="last-update" id="lastUpdate"></div>
</div>

<script>
  var DATA_URL = 'https://jsonblob.com/api/jsonBlob/019f540b-f8ce-7ab1-b9d0-1e9caa288ffd';
  var PASSWORD = 'yin302121';

  function checkPw() {
    if (document.getElementById('pwInput').value === PASSWORD) {
      document.getElementById('pwOverlay').style.display = 'none';
      loadData();
    } else {
      document.getElementById('pwErr').style.display = 'block';
    }
  }

  async function loadData() {
    var c = document.getElementById('content');
    var t = document.getElementById('table');
    c.className = 'loading'; c.innerHTML = '加载中...'; c.style.display = 'block'; t.style.display = 'none';

    try {
      var resp = await fetch(DATA_URL + '?t=' + Date.now());
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      var data = await resp.json();

      if (!Array.isArray(data) || !data.length) {
        c.className = 'empty'; c.innerHTML = '暂无报名数据';
        document.getElementById('stats').textContent = '';
        document.getElementById('lastUpdate').textContent = '';
        return;
      }

      c.style.display = 'none'; t.style.display = '';
      var tbody = document.getElementById('tbody');
      tbody.innerHTML = '';

      data.forEach(function(entry, i) {
        var tr = document.createElement('tr');
        tr.innerHTML =
          '<td>' + (i + 1) + '</td>' +
          '<td>' + (entry.time || '-') + '</td>' +
          '<td>' + esc(entry.name) + '</td>' +
          '<td>' + esc(entry.company) + '</td>' +
          '<td>' + esc(entry.title) + '</td>' +
          '<td>' + esc(entry.phone) + '</td>' +
          '<td>' + esc(entry.wechat) + '</td>' +
          '<td class="' + (entry.dinner === '参加' ? 'dinner-yes' : 'dinner-no') + '">' + esc(entry.dinner) + '</td>' +
          '<td class="remark">' + esc(entry.remark) + '</td>';
        tbody.appendChild(tr);
      });

      var dinnerCount = data.filter(function(e){ return e.dinner === '参加'; }).length;
      document.getElementById('stats').textContent = '共 ' + data.length + ' 人报名 | 晚宴: ' + dinnerCount + ' 人';
      document.getElementById('lastUpdate').textContent = '最近更新: ' + new Date().toLocaleString('zh-CN');
    } catch (e) {
      c.className = 'error';
      c.innerHTML = '加载失败: ' + e.message + '<br><small>请检查网络后刷新</small>';
    }
  }

  function esc(s) { if (!s) return '-'; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  function exportCSV() {
    var rows = [['序号','报名时间','姓名','企业名称','职务','手机号','微信号','晚宴','备注']];
    document.querySelectorAll('#tbody tr').forEach(function(tr) {
      var cols = [];
      tr.querySelectorAll('td').forEach(function(td) { cols.push('"' + (td.textContent || '').replace(/"/g,'""') + '"'); });
      rows.push(cols);
    });
    var csv = '﻿' + rows.map(function(r) { return r.join(','); }).join('\n');
    var blob = new Blob([csv], {type: 'text/csv;charset=utf-8;'});
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob); a.download = '报名数据_' + new Date().toISOString().slice(0,10) + '.csv';
    a.click();
  }

  async function clearData() {
    if (!confirm('确定清空所有报名数据？此操作不可恢复。')) return;
    try {
      await fetch(DATA_URL, { method: 'PUT', headers: {'Content-Type': 'application/json'}, body: '[]' });
      loadData();
    } catch(e) { alert('清空失败: ' + e.message); }
  }
</script>
</body>
</html>
